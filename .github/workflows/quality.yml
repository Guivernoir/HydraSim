name: Quality

on:
  push:
  pull_request:

jobs:
  hydrasim-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev tools
        run: python -m pip install -e ".[dev]"

      - name: Format check
        run: >
          python -m black --check
          src/wt_simulator/scenarios
          tests/test_mvp_modbus_scenarios.py
          tools

      - name: Quality policy check
        run: python tools/check_project_quality.py

      - name: Unit tests
        run: python -m unittest discover -s tests -v
