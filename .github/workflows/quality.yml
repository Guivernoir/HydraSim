name: Quality

on:
  push:
  pull_request:

jobs:
  hydrasim-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package, Modbus support, and dev tools
        run: python -m pip install -e ".[dev,modbus]"

      - name: Format check
        run: >
          python -m black --check
          src/wt_simulator/scenarios
          src/wt_simulator/ics
          src/wt_simulator/hydraulics
          tests/test_mvp_modbus_scenarios.py
          tests/test_ics_runtime.py
          tests/test_cfd_digital_twin.py
          tests/test_cfd_coupling.py
          tests/test_cfd_operator_semantics.py
          tests/test_cfd_calibration_evidence.py
          tests/test_cfd_verification.py
          tools

      - name: Quality policy check
        run: python tools/check_project_quality.py

      - name: Unit tests
        run: python -m unittest discover -s tests -v
